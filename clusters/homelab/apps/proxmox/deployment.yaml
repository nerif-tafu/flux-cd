# Proxmox VE in Docker (dockurr/proxmox). Requires KVM on the node (nested virt if nodes are VMs).
# hostNetwork bridges enp88s0 → vmbr0 on whichever proxmox-capable node is scheduled (preferred: black-02).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxmox
  namespace: proxmox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: proxmox
  template:
    metadata:
      labels:
        app: proxmox
    spec:
      terminationGracePeriodSeconds: 120
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        homelab.tafu.casa/proxmox-capable: "true"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - black-02
            - weight: 50
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - black-01
            - weight: 25
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - black-03
      initContainers:
        - name: select-network-profile
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              profile="/profiles/${NODE_NAME}"
              if [ ! -f "${profile}" ]; then
                echo "no network profile for node ${NODE_NAME}" >&2
                exit 1
              fi
              cp "${profile}" /work/interfaces
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: network-profiles
              mountPath: /profiles
            - name: network-interfaces
              mountPath: /work
      containers:
        - name: proxmox
          image: docker.io/dockurr/proxmox:9.2.5 # {"$imagepolicy": "flux-system:proxmox"}
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proxmox
                  key: PASSWORD
            - name: TZ
              value: America/Santiago
            - name: NETWORK
              value: "N"
            - name: NODE_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: PROXMOX_LEGACY_NODE_NAME
              value: pve
          ports:
            - name: https
              containerPort: 8006
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/vz
            - name: config
              mountPath: /var/lib/pve-cluster
            - name: network-interfaces
              mountPath: /etc/network/interfaces
              subPath: interfaces
            - name: dev-kvm
              mountPath: /dev/kvm
            - name: dev-net-tun
              mountPath: /dev/net/tun
            - name: startup
              mountPath: /usr/local/bin/ensure-pve-cluster.sh
              subPath: ensure-pve-cluster.sh
              readOnly: true
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - /usr/local/bin/ensure-pve-cluster.sh
          livenessProbe:
            tcpSocket:
              port: 8006
            initialDelaySeconds: 180
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - curl -sk --fail --max-time 5 https://127.0.0.1:8006/ >/dev/null
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: proxmox-data
        - name: config
          persistentVolumeClaim:
            claimName: proxmox-config
        - name: network-profiles
          configMap:
            name: proxmox-network-profiles
        - name: network-interfaces
          emptyDir: {}
        - name: startup
          configMap:
            name: proxmox-startup
            defaultMode: 0755
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
