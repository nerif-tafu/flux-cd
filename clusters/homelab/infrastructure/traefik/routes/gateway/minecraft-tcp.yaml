apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: minecraft
  namespace: traefik
  labels:
    traefik.tafu.casa/instance: gateway
spec:
  entryPoints:
    - minecraft
  routes:
    - match: HostSNI(`*`)
      services:
        - name: minecraft
          namespace: minecraft
          port: 25565
