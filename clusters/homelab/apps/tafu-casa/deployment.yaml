apiVersion: apps/v1
kind: Deployment
metadata:
  name: tafu-casa
  namespace: tafu-casa
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tafu-casa
  template:
    metadata:
      labels:
        app: tafu-casa
    spec:
      containers:
        - name: tafu-casa
          image: ghcr.io/nerif-tafu/tafu-casa:v2.0.1 # {"$imagepolicy": "flux-system:tafu-casa"}
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tafu-casa-secret
                  key: ADMIN_PASSWORD
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tafu-casa-data
