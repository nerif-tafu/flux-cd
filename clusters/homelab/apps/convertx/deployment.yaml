apiVersion: apps/v1
kind: Deployment
metadata:
  name: convertx
  namespace: convertx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: convertx
  template:
    metadata:
      labels:
        app: convertx
    spec:
      containers:
        - name: convertx
          image: ghcr.io/c4illin/convertx:v0.9.0 # {"$imagepolicy": "flux-system:convertx"}
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: convertx-secret
                  key: JWT_SECRET
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: convertx-data
