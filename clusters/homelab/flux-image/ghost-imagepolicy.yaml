apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ghost
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: ghost
  filterTags:
    pattern: '^(?P<version>[0-9]+\.[0-9]+\.[0-9]+)-alpine$'
    extract: '$version'
  policy:
    semver:
      range: ">=6.0.0"
