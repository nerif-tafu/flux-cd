apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: wg-easy
  namespace: traefik
  labels:
    traefik.tafu.casa/instance: gateway
spec:
  entryPoints:
    - wgeasyhttp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: wg-easy
          namespace: wg-easy
          port: 51821
