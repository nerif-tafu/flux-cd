apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-booter
  namespace: rust-booter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rust-booter
  template:
    metadata:
      labels:
        app: rust-booter
    spec:
      containers:
        - name: rust-booter
          image: ghcr.io/nerif-tafu/rust-booter:v1.0.4 # {"$imagepolicy": "flux-system:rust-booter"}
          env:
            # Rate limit per visitor rather than per proxy. Without this every
            # request is keyed to the Traefik pod, so all users share one bucket
            # and the 30/15min action limit locks out everyone at once.
            # Must be the hop count, not "true": the app passes a non-numeric
            # value through to Express verbatim, which rejects it as an IP and
            # exits. 1 = trust only the address Traefik appends.
            - name: TRUST_PROXY
              value: "1"
          ports:
            - containerPort: 8534
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rust-booter-data
