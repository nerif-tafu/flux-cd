apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: filebrowser
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: filebrowser
  filterTags:
    pattern: '^[v]?\d+\.\d+\.\d+-stable$'
  policy:
    semver:
      # Range includes prerelease-style tags like 1.2.3-stable (see Masterminds/semver x.y.z-0).
      range: ">=1.0.0-0"
