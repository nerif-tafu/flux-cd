# Hybrid: signaling via https://livekit.tafu.casa (Traefik :443). hostNetwork binds media ports on the node.
# Forward UDP 50000-50060, UDP 3478, and TCP 7881 to this node's LAN IP (7880 public forward not required).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: tandem
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      enableServiceLinks: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: black-03
      containers:
        - name: livekit
          image: docker.io/livekit/livekit-server:v1.13.3 # {"$imagepolicy": "flux-system:livekit"}
          args:
            - --bind
            - 0.0.0.0
            - --config
            - /etc/livekit.yaml
          env:
            - name: NODE_IP
              valueFrom:
                secretKeyRef:
                  name: tandem-env
                  key: LIVEKIT_NODE_IP
            - name: LIVEKIT_KEYS
              valueFrom:
                secretKeyRef:
                  name: tandem-env
                  key: LIVEKIT_KEYS
          ports:
            - name: signal
              containerPort: 7880
              protocol: TCP
            - name: rtc-tcp
              containerPort: 7881
              protocol: TCP
            - name: turn
              containerPort: 3478
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/livekit.yaml
              subPath: livekit.yaml
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: livekit-config
