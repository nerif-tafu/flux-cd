# Conservative auto-update within LiveKit 1.x (skip latest/rc/master).
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: livekit
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: livekit
  filterTags:
    pattern: '^v(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: '>=1.9.12 <2.0.0'
