apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
  namespace: traefik
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "26.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 192.168.3.62
    # No global HTTP→HTTPS redirect so webplayer and others can be HTTP-only on port 80
    logs:
      access:
        enabled: true
        format: json
    providers:
      kubernetesCRD:
        labelSelector: "traefik.tafu.casa/instance=internal"
      kubernetesIngress:
        labelSelector: "traefik.tafu.casa/instance=internal"
    # Prometheus metrics for monitoring stack
    metrics:
      prometheus:
        entryPoint: metrics
        # Required for per-site/per-router dashboards (adds router/service labels)
        addRoutersLabels: true
        addServicesLabels: true
        addEntryPointsLabels: true
        service:
          enabled: true
        serviceMonitor:
          enabled: true
