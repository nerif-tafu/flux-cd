apiVersion: apps/v1
kind: Deployment
metadata:
  name: tafu-casa
  namespace: tafu-casa
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tafu-casa
  template:
    metadata:
      labels:
        app: tafu-casa
    spec:
      containers:
        - name: tafu-casa
          image: ghcr.io/nerif-tafu/tafu-casa:v2.0.2 # {"$imagepolicy": "flux-system:tafu-casa"}
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tafu-casa-secret
                  key: ADMIN_PASSWORD
            # Identify visitors by the address Traefik forwards, not the proxy's
            # own socket address. Safe because networkpolicy.yaml permits ingress
            # only from Traefik, so no other pod can supply this header.
            # Depth 1 = the last entry, which is the one Traefik itself appends.
            - name: ADDRESS_HEADER
              value: X-Forwarded-For
            - name: XFF_DEPTH
              value: "1"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tafu-casa-data
