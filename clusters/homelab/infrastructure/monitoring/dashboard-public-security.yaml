apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-public-security
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  public-security.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "showLabels": true,
            "showTime": false,
            "wrapLogMessage": false
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(15, sum by (ClientAddr) (count_over_time({namespace=\"traefik\", pod=~\"traefik-public-.*\"} | json | DownstreamStatus=~\"401|404|5..\" [5m])))",
              "refId": "A"
            }
          ],
          "title": "Top client IPs (401/404/5xx) - last 5m",
          "type": "table"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(15, sum by (RequestPath) (count_over_time({namespace=\"traefik\", pod=~\"traefik-public-.*\"} | json | DownstreamStatus=~\"401|404|5..\" [5m])))",
              "refId": "A"
            }
          ],
          "title": "Top paths (401/404/5xx) - last 5m",
          "type": "table"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (DownstreamStatus) (count_over_time({namespace=\"traefik\", pod=~\"traefik-public-.*\"} | json | DownstreamStatus!=\"\" [5m]))",
              "refId": "A"
            }
          ],
          "title": "Public Traefik responses by status (access logs) - last 5m",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 17
          },
          "id": 4,
          "targets": [
            {
              "editorMode": "code",
              "expr": "{namespace=\"traefik\", pod=~\"traefik-public-.*\"} |= \"TLS\"",
              "refId": "A"
            }
          ],
          "title": "TLS-related logs (public Traefik)",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "security",
        "traefik",
        "public"
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "Public security (Traefik logs)",
      "uid": "public-security",
      "version": 1
    }
