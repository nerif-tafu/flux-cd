apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  namespace: minecraft
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: docker.io/itzg/minecraft-server:2024.11.0
          env:
            - name: EULA
              value: "TRUE"
            - name: SERVER_NAME
              value: "HopHop Minecraft"
          ports:
            - name: game
              containerPort: 25565
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-data
