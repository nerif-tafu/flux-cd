# Ensures pmxcfs can resolve the node name after hostNetwork pod starts; migrates VM configs on failover.
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxmox-startup
  namespace: proxmox
data:
  ensure-pve-cluster.sh: |
    #!/bin/bash
    set -euo pipefail
    LEGACY_NODE="${PROXMOX_LEGACY_NODE_NAME:-pve}"
    NODE_IP="${NODE_HOST_IP:-$(ip -4 route get 1.1.1.1 2>/dev/null | awk '{print $7; exit}')}"
    LOCAL_NODE="$(cat /proc/sys/kernel/hostname)"

    # pmxcfs requires the k8s node hostname to resolve to a non-loopback IP.
    if ! grep -qE "[[:space:]]${LOCAL_NODE}([[:space:]]|$)" /etc/hosts || ! grep -q "${NODE_IP}" /etc/hosts; then
      sed -i "/[[:space:]]${LOCAL_NODE}[[:space:]]/d" /etc/hosts 2>/dev/null || true
      echo "${NODE_IP} ${LOCAL_NODE}" >> /etc/hosts
    fi

    for _ in $(seq 1 60); do
      systemctl is-active --quiet pve-cluster && break
      systemctl start pve-cluster 2>/dev/null || true
      sleep 2
    done

    migrate_node_configs() {
      local src="$1"
      [ "${src}" = "${LOCAL_NODE}" ] && return 0
      [ -d "/etc/pve/nodes/${src}/qemu-server" ] || return 0

      pvecm expected 1 2>/dev/null || true
      mkdir -p "/etc/pve/nodes/${LOCAL_NODE}/qemu-server"
      for conf in /etc/pve/nodes/${src}/qemu-server/*.conf; do
        [ -f "${conf}" ] || continue
        dest="/etc/pve/nodes/${LOCAL_NODE}/qemu-server/$(basename "${conf}")"
        [ -f "${dest}" ] || mv "${conf}" "${dest}"
      done
      for f in pve-ssl.key pve-ssl.pem ssh_known_hosts lrm_status; do
        if [ -f "/etc/pve/nodes/${src}/${f}" ] && [ ! -f "/etc/pve/nodes/${LOCAL_NODE}/${f}" ]; then
          mv "/etc/pve/nodes/${src}/${f}" "/etc/pve/nodes/${LOCAL_NODE}/${f}"
        fi
      done
      if [ -d "/etc/pve/nodes/${src}/priv" ]; then
        mkdir -p "/etc/pve/nodes/${LOCAL_NODE}/priv"
        for item in /etc/pve/nodes/${src}/priv/*; do
          [ -e "${item}" ] || continue
          base="$(basename "${item}")"
          [ -e "/etc/pve/nodes/${LOCAL_NODE}/priv/${base}" ] || mv "${item}" "/etc/pve/nodes/${LOCAL_NODE}/priv/"
        done
      fi
    }

    # dockur originally used "pve"; hostNetwork uses the k8s node name. Migrate from any prior node on failover.
    migrate_node_configs "${LEGACY_NODE}"
    for src_dir in /etc/pve/nodes/*/; do
      [ -d "${src_dir}" ] || continue
      migrate_node_configs "$(basename "${src_dir}")"
    done

    systemctl try-restart pvedaemon pveproxy 2>/dev/null || true
