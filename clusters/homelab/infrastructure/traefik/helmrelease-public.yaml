apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-public
  namespace: traefik
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "26.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 192.168.3.61
        # Preserve the client source IP. With the default (Cluster), kube-proxy
        # SNATs inbound traffic to a node address before Traefik sees it, so
        # every visitor looks like the same internal IP and X-Forwarded-For
        # carries that useless value downstream. With Local, MetalLB announces
        # the VIP only from nodes running a ready Traefik pod and traffic is
        # delivered without SNAT.
        externalTrafficPolicy: Local
    experimental:
      plugins:
        fail2ban:
          moduleName: github.com/tomMoulard/fail2ban
          version: v0.8.9
    additionalArguments:
      - --entrypoints.web.http.redirections.entrypoint.to=:443
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
    logs:
      access:
        enabled: true
        format: json
    providers:
      kubernetesCRD:
        labelSelector: "traefik.tafu.casa/instance=public"
      kubernetesIngress:
        labelSelector: "traefik.tafu.casa/instance=public"
    # Dashboard must not be exposed on public instance; access via internal only (traefik-public.cl.tafu.casa on .62)
    ingressRoute:
      dashboard:
        enabled: false
    # Prometheus metrics for monitoring stack
    metrics:
      prometheus:
        entryPoint: metrics
        # Required for per-site/per-router dashboards (adds router/service labels)
        addRoutersLabels: true
        addServicesLabels: true
        addEntryPointsLabels: true
        service:
          enabled: true
        serviceMonitor:
          enabled: true
