apiVersion: apps/v1
kind: Deployment
metadata:
  name: webplayer
  namespace: webplayer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: webplayer
  template:
    metadata:
      labels:
        app: webplayer
    spec:
      # Use node L2/L3 for 192.168.3.0/24 (LAN APIs, NAS, etc.); default pod CIDR + SNAT can fail ACLs or routing.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        # TMP on same filesystem as LIBRARY_ROOT — Node rename() from /tmp to /data fails with EXDEV.
        - name: ensure-tmp
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /data/tmp && chmod 1777 /data/tmp
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: webplayer
          image: ghcr.io/throwmyaway1038471/webplayer:1.1.0 # {"$imagepolicy": "flux-system:webplayer"}
          env:
            - name: ALLOWED_HOSTS
              value: "webplayer.cl.tafu.casa"
            - name: LIBRARY_ROOT
              value: "/data"
            - name: TMPDIR
              value: "/data/tmp"
          ports:
            - containerPort: 5173
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: webplayer-data
