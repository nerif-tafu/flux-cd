apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: logging
spec:
  interval: 15m
  chart:
    spec:
      chart: promtail
      version: "6.17.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    config:
      clients:
        - url: http://loki-gateway/loki/api/v1/push
      snippets:
        pipelineStages:
          - cri: {}
          - match:
              selector: '{namespace="traefik", container="traefik-public"}'
              stages:
                - json:
                    expressions:
                      ClientAddr: ClientAddr
                - geoip:
                    source: ClientAddr
                    db: /var/lib/geoip/GeoLite2-City.mmdb
                    db_type: city
                - labeldrop:
                    - geoip_city_name
                    - geoip_country_name
                    - geoip_location_latitude
                    - geoip_location_longitude
                    - geoip_continent_code
                    - geoip_continent_name
                    - geoip_subdivision_code
                    - geoip_subdivision_name
                    - geoip_timezone
                    - geoip_postal_code
    extraVolumes:
      - name: geoip
        emptyDir: {}
      - name: maxmind-license
        secret:
          secretName: maxmind-license
    extraVolumeMounts:
      - name: geoip
        mountPath: /var/lib/geoip
        readOnly: true
    initContainer:
      - name: geoip-download
        image: alpine:3.19
        command:
          - sh
          - -c
          - |
            set -e
            apk add --no-cache curl
            mkdir -p /var/lib/geoip
            curl -sSLf "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=$(cat /etc/maxmind-license/license_key)&suffix=tar.gz" | tar -xz -C /var/lib/geoip
            mv /var/lib/geoip/GeoLite2-City_*/GeoLite2-City.mmdb /var/lib/geoip/GeoLite2-City.mmdb
            rm -rf /var/lib/geoip/GeoLite2-City_*
        volumeMounts:
          - name: geoip
            mountPath: /var/lib/geoip
          - name: maxmind-license
            mountPath: /etc/maxmind-license
            readOnly: true
