apiVersion: apps/v1
kind: Deployment
metadata:
  name: skate-streamer-reciever
  namespace: skate-streamer-reciever
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: skate-streamer-reciever
  template:
    metadata:
      labels:
        app: skate-streamer-reciever
    spec:
      initContainers:
        - name: ensure-recordings-dir
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /data/recordings && chmod 1777 /data/recordings
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: receiver
          image: ghcr.io/nerif-tafu/skate-streamer-reciever:v1.10.4 # {"$imagepolicy": "flux-system:skate-streamer-receiver"}
          ports:
            - containerPort: 9090
          envFrom:
            - secretRef:
                name: skate-streamer-reciever-env
          env:
            - name: MONITOR_RECORDINGS_DIR
              value: "/data/recordings"
            # Rate limit per visitor rather than per proxy. Without this every
            # request is keyed to the Traefik pod, so all users share one bucket
            # and the 20/15min auth limit locks out everyone at once.
            # Must be the hop count, not "true": the app passes a non-numeric
            # value through to Express verbatim, which rejects it as an IP and
            # exits. 1 = trust only the address Traefik appends.
            - name: TRUST_PROXY
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: skate-streamer-reciever-data
