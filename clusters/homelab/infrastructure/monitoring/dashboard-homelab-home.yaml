apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homelab-home
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-home.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "content": "## Homelab dashboards\n\n- [Traefik overview](/d/traefik-overview/traefik-overview)\n- [Public security (Traefik logs)](/d/public-security/public-security-traefik-logs)\n- [Certificates (cert-manager)](/d/certificates/certificates-cert-manager)\n- [Homelab resources (namespace)](/d/homelab-resources/homelab-resources-namespace)\n\n## Useful UIs\n\n- [Longhorn UI](https://longhorn.cl.tafu.casa/)\n- [Traefik internal dashboard](https://traefik-internal.cl.tafu.casa/dashboard/)\n- [Traefik public dashboard](https://traefik-public.cl.tafu.casa/dashboard/)\n\nTip: pin favorites in the left sidebar.",
            "mode": "markdown"
          },
          "title": "Home",
          "type": "text"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (service) (rate(traefik_entrypoint_requests_total{service=~\"traefik-(public|internal)-metrics\"}[5m]))",
              "legendFormat": "{{service}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Traefik request rate (public vs internal)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "MBs"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto"
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "(\n  sum(rate(container_network_receive_bytes_total{pod!=\"\"}[5m]))\n+ sum(rate(container_network_transmit_bytes_total{pod!=\"\"}[5m]))\n) / 1024 / 1024",
              "instant": true,
              "legendFormat": "cluster traffic",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Cluster traffic (MB/s)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "decgigabytes"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Used"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Used"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Total"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Total (max)"
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 8,
            "y": 8
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": true
            },
            "showPercentChange": false,
            "textMode": "value_and_name",
            "wideLayout": true
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(node_filesystem_size_bytes{fstype!=\"\",mountpoint=\"/\"}) - sum(node_filesystem_free_bytes{fstype!=\"\",mountpoint=\"/\"})",
              "instant": true,
              "legendFormat": "Used",
              "range": false,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum(node_filesystem_size_bytes{fstype!=\"\",mountpoint=\"/\"})",
              "hide": false,
              "instant": true,
              "legendFormat": "Total",
              "range": false,
              "refId": "B"
            }
          ],
          "title": "Disk (used / max available)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 8
          },
          "id": 5,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(traefik_router_requests_total{service=\"traefik-public-metrics\",code=~\"4..|5..\"}[5m]))\n/ sum(rate(traefik_router_requests_total{service=\"traefik-public-metrics\"}[5m]))",
              "instant": true,
              "legendFormat": "4xx+5xx / total",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Public error ratio (fail2ban load proxy)",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "MBs"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "id": 6,
          "options": {
            "showHeader": true
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "(\n  sum by (namespace,pod) (\n    rate(container_network_receive_bytes_total{pod!=\"\"}[5m])\n  + rate(container_network_transmit_bytes_total{pod!=\"\"}[5m])\n  )\n) / 1024 / 1024",
              "instant": true,
              "legendFormat": "{{namespace}}/{{pod}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Per-pod network throughput (MB/s)",
          "transformations": [
            {
              "id": "seriesToRows",
              "options": {}
            }
          ],
          "type": "table"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "home",
        "homelab"
      ],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Homelab Home",
      "uid": "homelab-home",
      "version": 1
    }
