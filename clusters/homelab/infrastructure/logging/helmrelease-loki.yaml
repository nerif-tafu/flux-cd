apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: logging
spec:
  interval: 15m
  chart:
    spec:
      chart: loki
      version: "6.53.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary

    # Ensure SimpleScalable targets are disabled (chart validates this).
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      # Homelab-friendly schema; switch to a real schemaConfig when you want stricter control.
      useTestSchema: true

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
        storageClass: longhorn
