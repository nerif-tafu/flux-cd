# TCP/UDP gateway at 192.168.3.63 for wg-easy (51820/udp, 51821/tcp) and KAG (50301/tcp, 50301/udp)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-gateway
  namespace: traefik
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "26.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 192.168.3.63
    # Don't expose default HTTP entrypoints on this LB
    ports:
      web:
        expose:
          default: false
      websecure:
        expose:
          default: false
      traefik:
        expose:
          default: false
      metrics:
        expose:
          default: false
      # wg-easy WireGuard
      wireguard:
        port: 51820
        expose:
          default: true
          exposedPort: 51820
        protocol: UDP
      # wg-easy web UI
      wgeasyhttp:
        port: 51821
        expose:
          default: true
          exposedPort: 51821
        protocol: TCP
      # KAG game server
      kagtcp:
        port: 50301
        expose:
          default: true
          exposedPort: 50301
        protocol: TCP
      kagudp:
        port: 50301
        expose:
          default: true
          exposedPort: 50301
        protocol: UDP
    providers:
      kubernetesCRD:
        labelSelector: "traefik.tafu.casa/instance=gateway"
        allowCrossNamespace: true
    # No Ingress provider needed; only TCP/UDP CRDs
    ingressRoute:
      dashboard:
        enabled: false
