# Grafana on internal Traefik only (grafana.cl.tafu.casa on .62)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  labels:
    traefik.tafu.casa/instance: internal
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik-internal
  rules:
    - host: grafana.cl.tafu.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
  tls:
    - hosts:
        - grafana.cl.tafu.casa
      secretName: grafana-cl-tafu-casa-tls
