apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homelab-resources
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-resources.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\",container!=\"\",image!=\"\"}[5m]))",
              "legendFormat": "CPU used",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Namespace CPU usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"$namespace\",container!=\"\",image!=\"\"})",
              "legendFormat": "Memory used",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Namespace memory usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(kube_pod_container_resource_requests{namespace=~\"$namespace\",resource=\"cpu\",unit=\"core\"}) / sum(kube_node_status_allocatable{resource=\"cpu\",unit=\"core\"})",
              "legendFormat": "CPU requested / allocatable",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "title": "CPU requests vs cluster allocatable",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(kube_pod_container_resource_requests{namespace=~\"$namespace\",resource=\"memory\",unit=\"byte\"}) / sum(kube_node_status_allocatable{resource=\"memory\",unit=\"byte\"})",
              "legendFormat": "Memory requested / allocatable",
              "instant": true,
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Memory requests vs cluster allocatable",
          "type": "gauge"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "homelab",
        "kubernetes"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "All",
              "value": "$__all"
            },
            "definition": "label_values(kube_namespace_created, namespace)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(kube_namespace_created, namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Homelab resources (namespace)",
      "uid": "homelab-resources",
      "version": 1
    }
