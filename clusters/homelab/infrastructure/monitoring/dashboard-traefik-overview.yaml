apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-traefik-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  traefik-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 0.5
                  }
                ]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(traefik_entrypoint_requests_total{service=~\"$traefik_service\"}[5m]))",
              "legendFormat": "req/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Total request rate",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(traefik_router_requests_total{service=~\"$traefik_service\",code=~\"5..\"}[5m])) / sum(rate(traefik_router_requests_total{service=~\"$traefik_service\"}[5m]))",
              "legendFormat": "5xx ratio",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "5xx error ratio",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(traefik_router_request_duration_seconds_bucket{service=~\"$traefik_service\"}[5m])))",
              "legendFormat": "p95",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Request duration p95 (all routers)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(12, sum by (router) (rate(traefik_router_requests_total{service=~\"$traefik_service\"}[5m])))",
              "legendFormat": "{{router}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Top routers by request rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "pluginVersion": "10.4.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(12, sum by (router) (rate(traefik_router_requests_total{service=~\"$traefik_service\",code=~\"4..\"}[5m])))",
              "legendFormat": "4xx {{router}}",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "topk(12, sum by (router) (rate(traefik_router_requests_total{service=~\"$traefik_service\",code=~\"5..\"}[5m])))",
              "legendFormat": "5xx {{router}}",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Top routers by error rate (4xx/5xx)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "traefik",
        "homelab"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "traefik-public-metrics",
              "value": "traefik-public-metrics"
            },
            "definition": "label_values(traefik_config_reloads_total, service)",
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "traefik_service",
            "options": [],
            "query": {
              "query": "label_values(traefik_config_reloads_total, service)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "/traefik-(?:public|internal)-metrics/",
            "skipUrlSync": false,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Traefik overview",
      "uid": "traefik-overview",
      "version": 1,
      "weekStart": ""
    }
