# Longhorn PVC for Security + Mods. We only mount those two dirs (subPath), not the whole
# /opt/KAG, because the image has entrypoint + binaries in /opt/KAG — mounting over it would break the container.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kag
  namespace: kag
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kag
  template:
    metadata:
      labels:
        app: kag
    spec:
      initContainers:
        - name: ensure-dirs
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/Security /data/Mods"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: kag
          image: ghcr.io/nerif-tafu/kag-dedicatedserver:v1.2.2 # {"$imagepolicy": "flux-system:kag"}
          env:
            - name: NAME
              value: "HopHop KAG Server"
            - name: PORT
              value: "50301"
            - name: SUPERADMIN_USERS
              value: "tafu"
          envFrom:
            - secretRef:
                name: kag-passwords
          ports:
            - name: game
              containerPort: 50301
              protocol: TCP
            - name: game-udp
              containerPort: 50301
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /opt/KAG/Security
              subPath: Security
            - name: data
              mountPath: /opt/KAG/Mods
              subPath: Mods
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kag-data
