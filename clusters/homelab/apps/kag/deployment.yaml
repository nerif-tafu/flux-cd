# KAG image has WORKDIR /opt/KAG and ENTRYPOINT ["./entrypoint.sh"]. Do NOT mount
# the whole PVC at /opt/KAG or it hides entrypoint.sh and binaries. Mount only
# Security and Mods per the image docs (subPath) so /opt/KAG stays from the image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kag
  namespace: kag
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kag
  template:
    metadata:
      labels:
        app: kag
    spec:
      initContainers:
        - name: ensure-dirs
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/Security /data/Mods"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: kag
          image: ghcr.io/nerif-tafu/kag-dedicatedserver:v1.2.0 # {"$imagepolicy": "flux-system:kag"}
          command: ["/bin/sh", "./entrypoint.sh"]
          args: ["./dedicatedserver.sh"]
          env:
            - name: NAME
              value: "HopHop KAG server"
            - name: PORT
              value: "50301"
            - name: SUPERADMIN_USERS
              value: "tafu"
          envFrom:
            - secretRef:
                name: kag-passwords
          ports:
            - name: game
              containerPort: 50301
              protocol: TCP
            - name: game-udp
              containerPort: 50301
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /opt/KAG/Security
              subPath: Security
            - name: data
              mountPath: /opt/KAG/Mods
              subPath: Mods
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kag-data
