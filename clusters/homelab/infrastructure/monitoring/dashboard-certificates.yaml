apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-certificates
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  certificates.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(20, (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400)",
              "legendFormat": "{{namespace}}/{{name}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Days until certificate expiry (top 20 closest)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "id": 2,
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (condition) (rate(certmanager_certificate_ready_status[5m]))",
              "legendFormat": "{{condition}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Certificate ready status rate",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "cert-manager",
        "tls"
      ],
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "title": "Certificates (cert-manager)",
      "uid": "certificates",
      "version": 1
    }
