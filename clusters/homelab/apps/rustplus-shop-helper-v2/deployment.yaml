apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustplus-shop-helper-v2
  namespace: rustplus-shop-helper-v2
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rustplus-shop-helper-v2
  template:
    metadata:
      labels:
        app: rustplus-shop-helper-v2
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: rustplus-shop-helper-v2
          image: ghcr.io/nerif-tafu/rustplus-shop-helper-v2:v1.2.1 # {"$imagepolicy": "flux-system:rustplus-shop-helper-v2"}
          env:
            # Rate limit per visitor rather than per proxy. Without this every
            # request is keyed to the Traefik pod, so all users share one bucket
            # and a single cold-cache shop grid — one image request per item —
            # can exhaust the image allowance for everyone.
            # Must be the hop count, not "true": the app passes a non-numeric
            # value through to Express verbatim, which rejects it as an IP and
            # exits. 1 = trust only the address Traefik appends.
            - name: TRUST_PROXY
              value: "1"
          ports:
            - containerPort: 3001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rustplus-shop-helper-v2-data
