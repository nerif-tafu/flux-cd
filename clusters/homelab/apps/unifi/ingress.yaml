# Web UI at https://unifi.cl.tafu.casa (Traefik terminates TLS, backend is UniFi HTTPS :8443).
# Device adoption: Settings → System → Override Inform Host — use MetalLB 192.168.3.64 or the
# node's 192.168.3.x where this pod runs (hostNetwork: source IP to gear is that node LAN IP).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unifi
  namespace: unifi
  labels:
    traefik.tafu.casa/instance: internal
  annotations:
    # Bind only to :443 inside the pod (maps from Service :443); avoids broken routers on web/metrics.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik-internal
  rules:
    - host: unifi.cl.tafu.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unifi
                port:
                  number: 8443
  tls:
    - hosts:
        - unifi.cl.tafu.casa
      secretName: unifi-cl-tafu-casa-tls
