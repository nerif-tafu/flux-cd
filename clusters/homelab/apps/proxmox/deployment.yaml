# Proxmox VE in Docker (dockurr/proxmox). Requires KVM on the node (nested virt if nodes are VMs).
# LAN bridge: hostNetwork on black-02 bridges enp88s0 → vmbr0 (192.168.3.0/24). VMs use router DHCP or static LAN IPs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxmox
  namespace: proxmox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: proxmox
  template:
    metadata:
      labels:
        app: proxmox
    spec:
      hostname: pve
      terminationGracePeriodSeconds: 120
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: black-02
      # hostNetwork uses the node hostname (black-02); pmxcfs needs a non-loopback /etc/hosts entry.
      hostAliases:
        - ip: "192.168.3.24"
          hostnames:
            - black-02
            - pve
      containers:
        - name: proxmox
          image: docker.io/dockurr/proxmox:9.2.3 # {"$imagepolicy": "flux-system:proxmox"}
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proxmox
                  key: PASSWORD
            - name: TZ
              value: America/Santiago
            - name: NETWORK
              value: "N"
            - name: NODE_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - name: https
              containerPort: 8006
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/vz
            - name: config
              mountPath: /var/lib/pve-cluster
            - name: network-interfaces
              mountPath: /etc/network/interfaces
              subPath: interfaces
              readOnly: true
            - name: dev-kvm
              mountPath: /dev/kvm
            - name: dev-net-tun
              mountPath: /dev/net/tun
            - name: startup
              mountPath: /usr/local/bin/ensure-pve-cluster.sh
              subPath: ensure-pve-cluster.sh
              readOnly: true
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - /usr/local/bin/ensure-pve-cluster.sh
          livenessProbe:
            tcpSocket:
              port: 8006
            initialDelaySeconds: 180
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - curl -sk --fail --max-time 5 https://127.0.0.1:8006/ >/dev/null
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: proxmox-data
        - name: config
          persistentVolumeClaim:
            claimName: proxmox-config
        - name: network-interfaces
          configMap:
            name: proxmox-network-interfaces
        - name: startup
          configMap:
            name: proxmox-startup
            defaultMode: 0755
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
