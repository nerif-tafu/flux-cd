# v1.3.0+: single /data mount (Longhorn). Image creates data/Security, data/Mods, etc. if missing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kag
  namespace: kag
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kag
  template:
    metadata:
      labels:
        app: kag
    spec:
      containers:
        - name: kag
          image: ghcr.io/nerif-tafu/kag-dedicatedserver:v1.3.1 # {"$imagepolicy": "flux-system:kag"}
          env:
            - name: NAME
              value: "HopHop KAG Server"
            - name: PORT
              value: "50301"
            - name: SUPERADMIN_USERS
              value: "tafu"
          envFrom:
            - secretRef:
                name: kag-passwords
          ports:
            - name: game
              containerPort: 50301
              protocol: TCP
            - name: game-udp
              containerPort: 50301
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kag-data
