apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "55.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Prometheus: 15d retention for homelab; discovers ServiceMonitors in all namespaces (Traefik, etc.)
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: 8GB
        serviceMonitorNamespaceSelector: {}
        # IMPORTANT: allow selecting ServiceMonitors across the cluster (e.g. Traefik's)
        # The chart defaults to selecting only ServiceMonitors with release=kube-prometheus-stack.
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
    grafana:
      enabled: true
      # Change password after first login or set admin.existingSecret
      ingress:
        enabled: false
      service:
        type: ClusterIP
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    alertmanager:
      enabled: true
      alertmanagerSpec:
        retention: 120h
