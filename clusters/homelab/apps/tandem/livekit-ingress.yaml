# LiveKit signaling on :443 (Traefik WSS → backend :7880). Media stays on direct UDP/TCP (hostNetwork).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: livekit
  namespace: tandem
  labels:
    traefik.tafu.casa/instance: public
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: traefik-fail2ban-public@kubernetescrd
spec:
  ingressClassName: traefik-public
  rules:
    - host: livekit.tafu.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: livekit
                port:
                  number: 7880
  tls:
    - hosts:
        - livekit.tafu.casa
      secretName: livekit-tls
