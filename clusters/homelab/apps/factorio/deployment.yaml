apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorio
  namespace: factorio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: factorio
  template:
    metadata:
      labels:
        app: factorio
    spec:
      securityContext:
        fsGroup: 845
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /factorio/config
              cp /seed/server-whitelist.json /factorio/config/
              cp /seed/server-adminlist.json /factorio/config/
              cp /seed/server-banlist.json /factorio/config/
              cp /seed/server-settings.json /factorio/config/
              chown -R 845:845 /factorio/config
          volumeMounts:
            - name: data
              mountPath: /factorio
            - name: config
              mountPath: /seed
      containers:
        - name: factorio
          image: docker.io/factoriotools/factorio:2.0.77 # {"$imagepolicy": "flux-system:factorio"}
          env:
            - name: PORT
              value: "34197"
            - name: LOAD_LATEST_SAVE
              value: "false"
            - name: SAVE_NAME
              value: "Multiplayer World"
            - name: DLC_SPACE_AGE
              value: "elevated-rails"
          ports:
            - name: game
              containerPort: 34197
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /factorio
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: factorio-data
        - name: config
          configMap:
            name: factorio-config
