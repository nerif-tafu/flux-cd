# FileBrowser Quantum: persist config/db/cache on PVC at /home/filebrowser/data, files at /srv.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-data-dirs
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/files /data/tmp
              chown -R 1000:1000 /data
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: filebrowser
          image: ghcr.io/gtsteffaniak/filebrowser:1.4.0-stable # {"$imagepolicy": "flux-system:filebrowser"}
          env:
            - name: FILEBROWSER_CONFIG
              value: /home/filebrowser/data/config.yaml
            - name: FILEBROWSER_DATABASE
              value: /home/filebrowser/data/database.db
            - name: FILEBROWSER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filebrowser-secret
                  key: FILEBROWSER_ADMIN_PASSWORD
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /home/filebrowser/data
            - name: config
              mountPath: /home/filebrowser/data/config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /srv
              subPath: files
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: filebrowser-data
        - name: config
          configMap:
            name: filebrowser-config
